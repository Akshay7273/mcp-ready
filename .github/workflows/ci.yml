name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Demo fixture must produce breaking findings (exit 1)
        run: |
          if npm run dev -- fixtures/ts-violations; then
            echo "ERROR: expected exit code 1 on the demo fixture"
            exit 1
          else
            echo "OK: demo fixture correctly flagged"
          fi
